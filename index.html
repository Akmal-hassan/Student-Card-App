<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Generator</title>
</head>

<style>
/* Mobile view */


@media (max-width: 768px){

    .container{
        height: auto;
        padding: 20px;
    }

    .container-child{
        width: 100%;
        height: auto;
        flex-direction: column;
        gap: 20px;
    }

    .form-input{
        width: 100%;
        height: auto;
        padding: 30px 20px;
    }

    .card{
        width: 100%;
        height: auto;
        padding: 30px 20px;
        border-radius: 10px;
    }

    input{
        width: 100%;
    }

    .btn{
        width: 100%;
    }

    .card img{
        width: 120px;
        height: 120px;
    }

    p{
        font-size: 18px;
        text-align: center;
    }
}


/* Ipad view */


@media (min-width: 769px) and (max-width: 1024px){

    .container-child{
        width: 95%;
        gap: 20px;
    }

    .form-input{
        width: 50%;
        height: 80%;
    }

    .card{
        width: 50%;
        height: 80%;
        border-radius: 10px;
    }

    input{
        width: 250px;
    }

    .btn{
        width: 250px;
    }

    p{
        font-size: 20px;
    }
}
    .container{
        /* border: 1px solid black; */
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container-child {
        /* border: 1px solid black; */
        width: 70%;
        height: 700px;
        display: flex;
        align-items: center;
    }

    .form-input {
        border: 1px solid black;
        border-radius: 10px;
        width: 50%;
        height: 70%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    input {
        width: 300px;
        height: 30px;
        font-size: 15px;
    }

    .btn {
        width: 150px;
        height: 40px;
        font-size: 15px;
        color: white;
        border: none;
        background: linear-gradient(135deg, #007bff, #00c6ff);
        cursor: pointer;
    }

    .card {
        /* border: 1px solid black; */
        width: 30%;
        height: 70%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #007bff, #00c6ff);
        flex-direction: column;
        color: white;
    }

    .card img{
        width: 150px;
        height: 150px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid white;
        margin-bottom: 20px;
    }

    p{
        font-size: x-large;
    }
</style>

<body>

    <div class="container">
        <div class="container-child">

            <div class="form-input">
                <div>
                    <h2>Enter Details</h2>

                    <form action="">
                        <input type="text" placeholder="Enter your Name"><br><br>

                        <input type="text" placeholder="Class Name"><br><br>

                        <input type="text" placeholder="Roll Number"><br><br>

                        <input type="file" id="fileInput"><br><br>

                        <button class="btn">Generate Card</button>
                    </form>
                </div>
            </div>

            <div class="card">
                <h2>Your Card</h2>
            </div>

        </div>
    </div>

</body>

<script>

let form = document.querySelector("form")
let card = document.querySelector(".card")

form.addEventListener("submit", (e) => {

    e.preventDefault();

    let name = form.elements[0].value
    let className = form.elements[1].value
    let rollNumber = form.elements[2].value

    let file = form.elements[3].files[0]

    let imageURL = URL.createObjectURL(file)

    card.innerHTML = `
        <img src="${imageURL}" alt="">
        <p><b>Name:</b> ${name}</p>
        <p><b>Class:</b> ${className}</p>
        <p><b>Roll Number:</b> ${rollNumber}</p>
    `
})

</script>

</html>
